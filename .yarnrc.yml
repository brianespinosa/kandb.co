compressionLevel: mixed

defaultSemverRangePrefix: ""

enableGlobalCache: false

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0086
    level: error
  # @vercel/backends and @vercel/cervel declare typescript ^4.0.0 || ^5.0.0 as a peer
  # dependency, but this constraint cannot be relaxed via packageExtensions (Yarn only
  # allows adding new peer deps, not overriding existing ones). TypeScript 6 is fully
  # compatible with these packages at runtime — the peer constraint is overly strict.
  # Downgrade these specific messages to warnings so the install succeeds.
  - text: "typescript is listed by your project with version 6.0.2 (p10b55d), which doesn't satisfy what @vercel/backends (via vercel) and other dependencies request (^4.9.5 || ^5.0.0)."
    level: warning
  - text: "Some peer dependencies are incorrectly met by your project; run yarn explain peer-requirements <hash> for details, where <hash> is the six-letter p-prefixed code."
    level: warning

nodeLinker: node-modules

# @napi-rs/wasm-runtime (a transitive dep of knip via oxc) declares
# @emnapi/core and @emnapi/runtime as required peer dependencies, but they
# are not needed at runtime in this project (only required in WASM environments).
# Without this override, Yarn raises a YN0002 error (treated as hard error above).
packageExtensions:
  "@axe-core/playwright@*":
    peerDependenciesMeta:
      playwright-core:
        optional: true
  "@vercel/express@*":
    peerDependencies:
      typescript: ">=4.9.5"
  vercel@*:
    peerDependencies:
      typescript: ">=4.9.5"
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true

yarnPath: .yarn/releases/yarn-4.13.0.cjs
